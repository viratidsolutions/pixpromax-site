<!DOCTYPE html>

<html>
<head>

<title>PixProMax - Free Online Image Tools</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:#111;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
}

.hero{
padding:50px 20px;
background:white;
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
color:#555;
}

.tools{
padding:40px 20px;
}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

max-width:900px;

margin:auto;

}

.card{

background:white;

padding:25px;

border-radius:8px;

box-shadow:0 2px 8px rgba(0,0,0,0.1);

}

.card h3{
margin-bottom:15px;
}

button{

background:#0077ff;

color:white;

border:none;

padding:10px 20px;

border-radius:5px;

cursor:pointer;

}

button:hover{

background:#005ce0;

}

footer{

margin-top:40px;

padding:20px;

background:#111;

color:white;

}

</style>

</head>

<body>

<header>
PixProMax
</header>

<div class="hero">

<h1>Compress, Resize & Convert Images Online</h1>

<p>Free fast image tools to optimize your photos instantly and easily.</p>

</div>

<div class="tools">

<div class="grid">

<div class="card">
<h3>Compress Image</h3>
<button onclick="location.href='/compress-image'">Open Tool</button>
</div>

<div class="card">
<h3>Resize Image</h3>
<button onclick="location.href='/resize-image'">Open Tool</button>
</div>

<h3>JPG to PNG</h3>
<button onclick="location.href='/jpg-to-png'">Open Tool</button>
</div>

<div class="card">

</div>

</div>

<footer>

© 2026 PixProMax

</footer>

</html>
