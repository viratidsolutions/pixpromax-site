<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Background Remover – PixProMax</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f7fb;
text-align:center;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

.upload-box{

border:2px dashed #0077ff;
padding:60px;
border-radius:15px;
cursor:pointer;
background:white;

}

.upload-box:hover{
background:#eef3ff;
}

.preview{

margin-top:30px;

}

img{
max-width:100%;
border-radius:10px;
}

button{

margin-top:20px;
padding:12px 22px;
border:none;
background:#0077ff;
color:white;
border-radius:6px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h1>AI Background Remover</h1>

<div class="upload-box" onclick="document.getElementById('file').click()">

<p>Click or Drop Image Here</p>

<input type="file" id="file" hidden>

</div>

<div class="preview">

<img id="preview">

</div>

<button id="removeBtn">Remove Background</button>

</div>

<script>

const fileInput=document.getElementById("file")
const preview=document.getElementById("preview")

fileInput.addEventListener("change",e=>{

const file=e.target.files[0]

preview.src=URL.createObjectURL(file)

})

</script>

</body>
</html>
