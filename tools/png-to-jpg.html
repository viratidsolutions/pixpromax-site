<!DOCTYPE html>

<html>
<head>
<title>PNG to JPG Converter Online | PixProMax</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial, sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:18px;
font-size:22px;
}

.container{
margin-top:40px;
}

.dropbox{
border:2px dashed #bbb;
padding:40px;
width:60%;
margin:auto;
background:white;
border-radius:6px;
}

canvas{
margin-top:20px;
max-width:90%;
}

button{
background:#0077ff;
color:white;
padding:12px 28px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#005ce0;
}
.upload-box{

border:2px dashed #0077ff;
border-radius:10px;
padding:40px;
text-align:center;
background:#f9fbff;
cursor:pointer;
margin-top:20px;

}

.upload-box:hover{

background:#eef5ff;

}
</style>

</head>
<script>

const box=document.getElementById("uploadBox")
const input=document.getElementById("fileInput")

box.addEventListener("dragover",e=>{
e.preventDefault()
box.style.background="#e6f0ff"
})

box.addEventListener("dragleave",()=>{
box.style.background="#f9fbff"
})

box.addEventListener("drop",e=>{
e.preventDefault()

input.files=e.dataTransfer.files

box.style.background="#f9fbff"

})

</script>
<body>

<header>PixProMax</header>

<div class="container">

<h1>PNG to JPG Converter</h1>

<p>Convert PNG images to JPG instantly.</p>

<div class="dropbox">
<div class="upload-box" id="uploadBox">

<p>Drag & Drop your image here</p>

<p>or</p>

<button onclick="document.getElementById('fileInput').click()">Upload Image</button>

<input type="file" id="fileInput" hidden>

</div>
</div>

<br>

<canvas id="canvas"></canvas>

<br>

<button onclick="convert()">Convert to JPG</button>

<br>

<button onclick="download()">Download JPG</button>

</div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let img=new Image()

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]

if(!file) return

img.onload=function(){

canvas.width=img.width
canvas.height=img.height

ctx.fillStyle="#ffffff"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.drawImage(img,0,0)

}

img.src=URL.createObjectURL(file)

})

function convert(){

canvas.toDataURL("image/jpeg",0.9)

}

function download(){

let link=document.createElement("a")

link.download="pixpromax-image.jpg"

link.href=canvas.toDataURL("image/jpeg",0.9)

link.click()

}

</script>

</body>
</html>
