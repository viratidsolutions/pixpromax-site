<!DOCTYPE html>
<html>
<head>
<title>Compress Image Online | PixProMax</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
font-size:22px;
}

.container{
margin-top:40px;
}

input{
margin-top:20px;
}

canvas{
margin-top:20px;
max-width:90%;
}

button{
background:#0077ff;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#005ce0;
}
</style>
</head>

<body>

<header>PixProMax</header>

<div class="container">

<h1>Compress Image Online</h1>

<p>Upload your image to reduce file size instantly.</p>

<input type="file" id="upload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<br>

<button onclick="download()">Download Compressed Image</button>

</div>

<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]

let img=new Image()

img.onload=function(){

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

}

img.src=URL.createObjectURL(file)

})

function download(){

let link=document.createElement("a")

link.download="compressed.jpg"

link.href=canvas.toDataURL("image/jpeg",0.6)

link.click()

}

</script>

</body>
</html>
